version: '3.8'

# ─── Coolify Deployment — niches.waqasalee.com ───────────────────────────────
# Environment variables Coolify dashboard se set karo (repo mein mat daalo)
# Domain routing Coolify ke UI se configure karo → port 3000

services:

  postgres:
    image: postgres:15
    container_name: niche_db
    restart: always
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./next-app
      dockerfile: Dockerfile
    container_name: niche_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL:         postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      YOUTUBE_API_KEY:      ${YOUTUBE_API_KEY}
      GOOGLE_CLIENT_ID:     ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      NEXTAUTH_SECRET:      ${NEXTAUTH_SECRET}
      NEXTAUTH_URL:         ${NEXTAUTH_URL}
      ADMIN_EMAIL:          ${ADMIN_EMAIL}
      NODE_ENV:             production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
