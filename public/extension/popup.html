<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Niche Finder Popup</title>
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      background: #0f0f10;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #ffffff;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .logo {
      font-size: 24px;
    }
    h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 800;
      background: linear-gradient(135deg, #a5b4fc 0%, #c084fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      font-size: 10px;
      color: #71717a;
      margin-top: 1px;
    }
    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .card p {
      margin: 0 0 8px 0;
      font-size: 12px;
      color: #a1a1aa;
      line-height: 1.4;
    }
    .btn {
      display: block;
      width: 100%;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      border: none;
      color: #ffffff;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      box-sizing: border-box;
      transition: all 0.2s ease;
      box-shadow: 0 4px 10px rgba(99, 102, 241, 0.2);
    }
    .btn:hover {
      background: linear-gradient(135deg, #4338ca 0%, #6d28d9 100%);
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: none;
      margin-top: 8px;
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
    }
    .footer {
      text-align: center;
      font-size: 10px;
      color: #52525b;
      margin-top: 16px;
    }
    .footer a {
      color: #7c3aed;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🎯</span>
    <div>
      <h1>Niche Finder</h1>
      <div class="subtitle">YouTube Research Companion</div>
    </div>
  </div>

  <div class="card">
    <p>
      Discover high-performing channels, evaluate niches, and locate content outliers directly from YouTube.
    </p>
    <a href="https://waqasalee.com/channels/long-form" target="_blank" class="btn">
      🎯 Open Web Application
    </a>
    <a href="https://waqasalee.com/channels/saved" target="_blank" class="btn btn-secondary">
      📂 My Saved Bookmarks
    </a>
  </div>

  <div class="footer">
    Powered by <a href="https://waqasalee.com" target="_blank">Waqasalee.com</a>
  </div>
</body>
</html>
