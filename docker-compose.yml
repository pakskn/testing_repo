version: '3.8'

# LOCAL TESTING VERSION
# Port 3000 exposed directly — open http://localhost:3000
# Port 5432 exposed — Python collector can reach DB from host
# No Traefik labels needed locally

services:

  postgres:
    image: postgres:15
    container_name: niche_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - niche_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nextjs:
    build:
      context: ./next-app
      dockerfile: Dockerfile.dev
    container_name: niche_app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - niche_network

volumes:
  postgres_data:

networks:
  niche_network:
    driver: bridge
