version: '3.8'
# ── LOCAL DEVELOPMENT ────────────────────────────────────
# Usage: docker-compose up -d --build
# Opens:  http://localhost:3000

services:
  postgres:
    image: postgres:15-alpine
    container_name: niche_db_local
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-nicheuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
      POSTGRES_DB:       ${DB_NAME:-nichefinder}
    ports:
      - "5432:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nicheuser} -d ${DB_NAME:-nichefinder}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: niche_app_local
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL:         postgresql://${DB_USER:-nicheuser}:${DB_PASSWORD:-devpassword}@postgres:5432/${DB_NAME:-nichefinder}
      YOUTUBE_API_KEY:      ${YOUTUBE_API_KEY}
      GOOGLE_CLIENT_ID:     ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      NEXTAUTH_SECRET:      ${NEXTAUTH_SECRET:-local-dev-secret-32chars-minimum}
      NEXTAUTH_URL:         ${NEXTAUTH_URL:-http://localhost:3000}
      ADMIN_EMAIL:          ${ADMIN_EMAIL}
      NODE_ENV:             development
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_local_data:
