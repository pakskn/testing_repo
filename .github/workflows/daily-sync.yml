name: 🔄 Daily Outlier Data Sync

on:
  schedule:
    - cron: '0 0 * * *' # Midnight daily (00:00 UTC)
  workflow_dispatch: # Enable manual run option from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Trigger VPS Sync Job via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 72.62.132.159
          username: waqas
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            cd /home/waqas/niche-finder
            sudo docker compose -f docker-compose.prod.yml run --rm app python3 data-collector/daily_collector.py
