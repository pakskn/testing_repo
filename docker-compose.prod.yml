version: '3.8'

# ── PRODUCTION COMPOSE (Caddy Proxy & Standard Docker Compose) ──
# Usage: docker compose -f docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:15-alpine
    container_name: niche_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-niche_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-N1ch3_P_2026_Secure_Db}
      POSTGRES_DB: ${DB_NAME:-niche_db}
    ports:
      - "127.0.0.1:5432:5432" # Securely bind to localhost only
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - niche_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: niche_app
    restart: always
    ports:
      - "127.0.0.1:3000:3000" # Securely bind to localhost only (Caddy will reverse proxy)
    environment:
      DATABASE_URL: postgresql://${DB_USER:-niche_user}:${DB_PASSWORD:-N1ch3_P_2026_Secure_Db}@postgres:5432/${DB_NAME:-niche_db}?schema=public
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: https://${DOMAIN}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN}
      NODE_ENV: production
    networks:
      - niche_network
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_prod_data:
    name: niche_postgres_prod_data

networks:
  niche_network:
    name: niche_prod_network
    driver: bridge
