version: '3.8'
# ── PRODUCTION — Traefik SSL (Hostinger VPS) ─────────────
# Usage: docker-compose -f docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:15-alpine
    container_name: niche_db
    restart: always
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - niche_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: niche_app
    restart: always
    environment:
      DATABASE_URL:         postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      YOUTUBE_API_KEY:      ${YOUTUBE_API_KEY}
      GOOGLE_CLIENT_ID:     ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      NEXTAUTH_SECRET:      ${NEXTAUTH_SECRET}
      NEXTAUTH_URL:         https://${DOMAIN}
      ADMIN_EMAIL:          ${ADMIN_EMAIL}
      NODE_ENV:             production
    networks:
      - niche_network
      - web
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.niche.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.niche.entrypoints=websecure"
      - "traefik.http.routers.niche.tls.certresolver=letsencrypt"
      - "traefik.http.services.niche.loadbalancer.server.port=3000"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.niche-http.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.niche-http.entrypoints=web"
      - "traefik.http.routers.niche-http.middlewares=https-redirect"
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"

volumes:
  postgres_prod_data:

networks:
  niche_network:
    driver: bridge
  web:
    external: true
